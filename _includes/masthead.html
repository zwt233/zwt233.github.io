{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg">
            <a class="site-title-link" href="{{ base_path }}/">
              <img class="site-title-logo" src="{{ base_path }}/images/brand/pku-logo.svg" alt="Peking University logo">
              <span>{{ site.title }}</span>
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          {% if page.url == "/" %}
            <li class="masthead__menu-item masthead__language-switch">
              <button class="language-toggle language-toggle--nav" type="button" data-language-toggle aria-label="Switch language">
                <span data-lang-label="en">EN</span>
                <span class="language-toggle__sep">/</span>
                <span data-lang-label="zh">中文</span>
              </button>
            </li>
          {% endif %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
